<html>
  <head>
    <title>CSS flexbox</title>
    <style>
      .one {
        width: 200px;
        height: 200px;
        background-color: aqua;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .two {
        width: 200px;
        height: 200px;
        background-color: yellow;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .three {
        width: 200px;
        height: 200px;
        background-color: green;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .four {
        width: 200px;
        height: 200px;
        background-color: red;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .five {
        width: 200px;
        height: 200px;
        background-color: blue;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .six {
        width: 200px;
        height: 200px;
        background-color: palegoldenrod;
        font-size: 100px;
        text-align: center;
        border: 2px solid black;
      }
      .main {
        display: flex;
        flex-direction: row-reverse;
        flex-wrap: nowrap;
        height: 100vh;
        border: 4px solid black;
        justify-content: space-evenly;
        justify-content: space-between;
        justify-content: space-around;
        justify-content: flex-end;
        justify-content: flex-start;
        justify-content: center;
        align-items: start;
        align-items: center;
        align-items: end;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
      <div class="five">5</div>
      <div class="six">6</div>
    </div>
  </body>
</html>
