<html>
  <head>
    <title>CSS box</title>
    <style>
      .one {
        height: 300px;
        width: 400px;
        text-align: center;
        border: 2px solid black;
        background-color: aqua;
      }
      .two {
        height: 300px;
        width: 400px;
        text-align: center;
        border: 2px solid black;
        padding: 50px;
        box-sizing: border-box;
        background-color: red;
      }
    </style>
  </head>
  <body>
    <div class="one">Class One</div>
    <div class="two">Class two</div>
  </body>
</html>
